# Alembic settings. The database URL is not stored here. migrations/env.py
# reuses the engine from app/db.py so the root .env file keeps working.

[alembic]
# %(here)s is the folder that holds this file, backend/.
script_location = %(here)s/migrations

# Put backend/ on the import path so env.py can import app.
prepend_sys_path = %(here)s

# Use the operating system path separator. This is required for Windows paths.
path_separator = os

# After Alembic generates a migration file, run ruff format on it. This
# rewrites the generated strings to double quotes to match project style.
[post_write_hooks]
hooks = ruff_format
ruff_format.type = exec
ruff_format.executable = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

# Logging configuration.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
