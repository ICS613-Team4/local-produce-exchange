name: Checks

on:
  pull_request:
  # Lets the Deploy workflow reuse these same checks before it deploys.
  workflow_call:
  # Allows this workflow to be run manually from the GitHub Actions tab.
  workflow_dispatch:

# If a new run starts for the same branch or PR, cancel the old one.
# The old run is testing a commit that is no longer the latest.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests-and-linters:
    name: Unit tests and linters
    runs-on: ubuntu-latest
    # Fail the job if it runs longer than this, instead of the 6-hour default.
    timeout-minutes: 15

    # The backend tests run against a real Postgres database now (SQLite was
    # dropped), so both the test fixture (through app/db.py) and any alembic
    # step read these. The runner reaches the service below at 127.0.0.1:5432,
    # which is the host app/db.py hard-codes, so no code change is needed.
    env:
      POSTGRES_USER: produce
      POSTGRES_PASSWORD: produce
      POSTGRES_DB: produce_exchange_test
      POSTGRES_PORT: 5432
    services:
      postgres:
        # Match the dev image in docker-compose.yml and the version named in
        # technical-design.md. Do not drift to a different major.
        image: postgres:18.4
        env:
          POSTGRES_USER: produce
          POSTGRES_PASSWORD: produce
          POSTGRES_DB: produce_exchange_test
        ports:
          - 5432:5432
        # Wait until Postgres accepts connections before the steps run, so the
        # first test does not race a still-starting database.
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Astral uv
        # Pinned to an exact release: setup-uv has no floating "v8" major tag yet,
        # so "@v8" fails to resolve and kills the job before any step runs.
        uses: astral-sh/setup-uv@v8.2.0

      # Guard against a platform-pruned lock file. If a teammate runs
      # "npm install" on Windows (or possibly Mac), npm can drop the optional
      # package entries that other operating systems need. That pruned lock
      # might still pass "npm ci" here on Linux while breaking for a teammate on
      # a different OS, so a plain install step would not always catch it.
      #
      # This regenerates the lock from the two manifest files in an empty
      # directory (the same way "npm run lock" does) and fails if the committed
      # lock differs. The runner is already Linux on Node 22, so it produces the
      # canonical lock without Docker. The check is idempotent on a correct lock.
      - name: Check the frontend lock file is the canonical one
        run: |
          mkdir -p "$RUNNER_TEMP/lockcheck"
          cp frontend/package.json frontend/package-lock.json "$RUNNER_TEMP/lockcheck/"
          cd "$RUNNER_TEMP/lockcheck"
          npm install --package-lock-only
          if ! diff -q "$RUNNER_TEMP/lockcheck/package-lock.json" "$GITHUB_WORKSPACE/frontend/package-lock.json" > /dev/null; then
            echo "::error::frontend/package-lock.json is not the canonical lock. Run 'npm run lock' on the repo root and commit the result."
            echo "Lines starting with '<' are in the committed lock; lines starting with '>' are what it should be:"
            diff "$GITHUB_WORKSPACE/frontend/package-lock.json" "$RUNNER_TEMP/lockcheck/package-lock.json" || true
            exit 1
          fi
          echo "Lock file is the canonical Linux-generated one."

      - name: Install dependencies
        run: npm run setup

      - name: Run linters
        run: npm run lint

      # Runs the TypeScript compiler and then bundles the frontend with vite.
      # Catches type errors and build-only failures (for example, Sass errors).
      - name: Build frontend
        run: npm run build

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            frontend/coverage
            backend/coverage
            backend/coverage.xml
